      description: "Email address of the user handling the transaction."
      dataType:
        type: "String"
    - name: "Puesto"
      description: "Job title of the user involved in the transaction."
      dataType:
        type: "String"
    - name: "Perfil_de_puesto"
      description: "Profile or role description associated with the user's job title."
      dataType:
        type: "String"
