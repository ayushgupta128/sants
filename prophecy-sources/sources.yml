      description: "Unique tax identification code for the client."
      dataType:
        type: "Double"
    - name: "Numero_de_Cliente"
      description: "Unique identifier for the customer in the system."
      dataType:
        type: "Double"
    - name: "Telefono"
      description: "Contact phone number of the customer."
      dataType:
        type: "Bigint"
    - name: "Pasaporte"
      description: "Passport number of the customer."
      dataType:
        type: "String"
    - name: "Libreta_Civica"
      description: "Civic booklet identifier for the customer."
      dataType:
        type: "String"
    - name: "Libreta_De_Enrolamiento"
      description: "Enrollment booklet number for the customer."
      dataType:
        type: "Double"
