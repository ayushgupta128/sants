      description: "Additional numerical data related to the customer."
      dataType:
        type: "Double"
    - name: "Tipo_de_telefono"
      description: "Type of phone associated with the customer, such as mobile or\
        \ landline."
      dataType:
        type: "String"
    - name: "Tipo_de_cliente"
      description: "Category of the client; Indicates the classification or segment\
        \ of the client."
      dataType:
        type: "String"
    - name: "Datos_extra_de_cliente"
      description: "Additional information about the client; Provides supplementary\
        \ details specific to the client."
      dataType:
        type: "String"
    - name: "Datos_extra_de_turno"
      description: "Additional information about the shift; Offers extra details related\
        \ to the specific shift."
      dataType:
        type: "String"
