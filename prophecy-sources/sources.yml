      description: "Type of identification document for the client holder."
      dataType:
        type: "String"
    - name: "DynCliTitAPerPDoc"
      description: "Country or place where the identification document was issued\
        \ for the client holder."
      dataType:
        type: "String"
    - name: "DynCliTitAPerDoc"
      description: "Identification document number for the client holder."
      dataType:
        type: "String"
    - name: "DynCliTitAPerNom1"
      description: "First given name of the client holder."
      dataType:
        type: "String"
    - name: "DynCliTitAPerNom2"
      description: "Second given name of the client holder."
      dataType:
        type: "String"
    - name: "DynCliTitAPerApe1"
      description: "First surname of the client holder."
      dataType:
        type: "String"
    - name: "DynCliTitAPerApe2"
      description: "Second surname of the client holder."
      dataType:
        type: "String"
    - name: "DynCliTitAFecMod"
      description: "Date and time when the record was last modified."
      dataType:
        type: "String"
    - name: "DynCliTitAUsrAlt"
      description: "Username of the person who created the record."
      dataType:
        type: "String"
    - name: "DynCliTitAUsrMod"
      description: "Username of the person who last modified the record."
      dataType:
        type: "String"
    - name: "DynCliTitALoteDW"
      description: "Batch identifier for data processing or integration."
      dataType:
        type: "String"
    - name: "DynCliTitAHash"
      description: "Unique hash value used to identify or verify the record."
      dataType:
        type: "String"
    - name: "data_date_part"
      description: "Date component representing when the record was processed or updated,\
        \ stored as an integer."
      dataType:
        type: "Integer"
    - name: "data_timestamp_part"
      description: "Exact timestamp indicating when the record was processed or updated."
      dataType:
        type: "Timestamp"
    type: "table"
