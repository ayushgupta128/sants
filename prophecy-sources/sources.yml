      description: "Name of the terminal used for the transaction or interaction."
      dataType:
        type: "String"
    - name: "Escapado"
      description: "Indicates if the customer left the queue before being served."
      dataType:
        type: "String"
    - name: "Tiene_prioridad"
      description: "Indicates if the transaction or appointment has priority status."
