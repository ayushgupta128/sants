        type: "String"
    - name: "DynCliTitAW8FchVto"
      description: "End date of the AW8 system status for the client."
      dataType:
        type: "String"
    - name: "DynCliTitAW8EstSis"
      description: "Current system status code for AW8 for the client."
      dataType:
        type: "String"
    - name: "DynCliTitAF3103FchIni"
      description: "Start date of the AF3103 system status for the client."
      dataType:
        type: "String"
    - name: "DynCliTitAF3103FchVto"
      description: "End date of the AF3103 system status for the client."
      dataType:
        type: "String"
    - name: "DynCliTitAF3103EstSis"
      description: "Current status of the AF3103 contract for the client."
      dataType:
        type: "String"
    - name: "DynCliTitAF306FchIni"
      description: "Start date of the AF306 contract for the client."
      dataType:
        type: "String"
    - name: "DynCliTitAF306FchVto"
      description: "Expiration date of the AF306 contract for the client."
      dataType:
        type: "String"
    - name: "DynCliTitAF306EstSis"
      description: "Current status of the AF306 contract for the client."
      dataType:
        type: "String"
    - name: "DynCliTitARolId"
      description: "Role identifier assigned to the client within the system."
      dataType:
        type: "String"
