      \ policy administration."
    config:
      tags:
      - "pipeline:C0030029_Aprovisionamiento_Dynatech"
    columns:
    - name: "DynCliTitAPNumPer"
      description: "Number of periods associated with the client’s account."
      dataType:
        type: "Double"
    - name: "DynCliTitACtdId"
      description: "Unique identifier for the client’s account."
      dataType:
        type: "String"
    - name: "DynCliTitAFec"
      description: "Date of the main event or transaction for the client."
      dataType:
        type: "String"
    - name: "DynCliTitAFecAlt"
      description: "Alternate date related to the client’s account or transaction."
      dataType:
        type: "String"
    - name: "DynCliTitAEstado"
      description: "Current status of the client’s account."
      dataType:
        type: "String"
    - name: "DynCliTitAW8FchIni"
      description: "Start date of the AW8 system status for the client."
