      description: "Description of the action taken or event that occurred."
      dataType:
        type: "String"
    - name: "Tramite"
      description: "Main procedure or process being handled."
      dataType:
        type: "String"
    - name: "Subtramite"
      description: "Specific sub-process or task within the main procedure."
      dataType:
        type: "String"
