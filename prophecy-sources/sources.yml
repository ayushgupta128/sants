      description: "Unique identifier for the waiting room; Used to distinguish between\
        \ different waiting areas."
      dataType:
        type: "Double"
    - name: "Nombre_de_sala_de_espera"
      description: "Name of the waiting room; Designates the specific waiting area\
        \ by name."
      dataType:
        type: "String"
