# ==================
# Project Details
# ==================
name: "DataLakeHouse_sql"
config-version: 2
require-dbt-version:
- ">=1.0.0"
- "<2.0.0"
version: "0.1"
profile: "prophecy-default"

# ==================
# File Path Configs
# ==================
clean-targets:
- "target"
- "dbt_modules"
- "logs"
seed-paths:
- "seeds"
model-paths:
- "models"
- "prophecy-sources"
macro-paths:
- "macros"
target-path: "target"

# ==================
# Variable Configs
# ==================
vars:
  db_name: ""
  schema_name: ""
  source_environment: "pro"
  target_environment: "dev"

# ============
# Misc
# ============
dispatch: []
